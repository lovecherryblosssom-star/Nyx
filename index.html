<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script & Stanza | Digital Archive</title>

    <!-- Google Fonts: Fleur De Leah, Lavishly Yours, Hurricane, Allura -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Fleur+De+Leah&family=Hurricane&family=Lavishly+Yours&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f7f3fa;
            --card-bg: rgba(255, 255, 255, 0.1);
            --lavender: #9b8fba;
            --blue: #7ba7c7;
            --text: #3a2e4a;
            --parchment: #b08968;
            --glow: rgba(179, 166, 211, 0.3);
            --pink-glow: #e0d4f5;
        }
        * { box-sizing: border-box; margin: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Allura', cursive;
            font-size: 1.3rem;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px; position: relative; overflow-x: hidden;
        }

        #weather-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .particle {
            position: absolute; top: -50px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        .flower-img {
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
        }
        .flower-img img {
            width: 38px; height: 38px; object-fit: contain;
        }

        /* petal shapes (fallback) */
        .petal-rose        { width:18px;height:18px;background:#e57373;border-radius:60% 40% 50% 50%;box-shadow:0 0 8px #ffb3b3; }
        .petal-sakura      { width:16px;height:16px;background:#ffc1e3;border-radius:50% 0 50% 0;box-shadow:0 0 6px #ffe4f0; }
        .petal-lotus       { width:18px;height:22px;background:#f8bbd0;border-radius:50% 50% 10% 10%;box-shadow:0 0 10px #fce4ec; }
        .petal-marigold    { width:18px;height:18px;background:#ffb74d;border-radius:70% 30% 60% 40%;box-shadow:0 0 12px #ffe082; }
        .petal-lavender    { width:10px;height:18px;background:#b39ddb;border-radius:50% 50% 30% 30%;box-shadow:0 0 6px #d1c4e9; }
        .petal-bluebell    { width:14px;height:16px;background:#90caf9;border-radius:60% 60% 30% 30%;box-shadow:0 0 6px #bbdefb; }
        .petal-wisteria    { width:12px;height:22px;background:#c5a3d9;border-radius:50% 50% 30% 30%;box-shadow:0 0 8px #e1d0f0; }
        .petal-jasmine     { width:12px;height:12px;background:#fdf5e6;border-radius:50%;box-shadow:0 0 10px #fff8dc; }
        .petal-babysbreath { width:8px;height:8px;background:#ffffff;border-radius:50%;opacity:0.9;box-shadow:0 0 10px #f0f0ff; }
        .petal-rumex       { width:6px;height:22px;background:#a0522d;border-radius:30% 70% 20% 80%;box-shadow:0 0 6px #cd853f; }
        .petal-whitemeadow { width:14px;height:14px;background:#f5f0e6;border-radius:70% 30% 70% 30%;box-shadow:0 0 15px #fff8f0; }
        .petal-sorrel      { width:6px;height:22px;background:#a0522d;border-radius:30% 70% 20% 80%;box-shadow:0 0 6px #cd853f; }
        .petal-larch       { width:10px;height:14px;background:#c2a144;border-radius:20% 80% 30% 70%;box-shadow:0 0 6px #e6c873; }
        .petal-buttercup   { width:16px;height:14px;background:#fdd835;border-radius:60% 40% 50% 50%;box-shadow:0 0 12px #ffee58; }
        .petal-clematis    { width:18px;height:18px;background:#ba9fcf;border-radius:0% 100% 0% 100%;box-shadow:0 0 10px #d9c2e6; }
        .petal-spirea      { width:14px;height:14px;background:#f5f0e6;border-radius:70% 30% 70% 30%;box-shadow:0 0 15px #fff8f0; }
        .petal-carolina    { width:16px;height:18px;background:#6b3a3a;border-radius:50% 50% 40% 40%;box-shadow:0 0 10px #a0522d; }
        .petal-tigerlily   { width:20px;height:24px;background:#ff8c00;border-radius:30% 70% 40% 60%;box-shadow:0 0 14px #ffa500; }
        .rain-drop  { width:2px;height:55px;background:linear-gradient(to bottom,transparent,#7ba7c7);opacity:0.85;box-shadow:0 0 6px #a8d0e6;border-radius:2px; }
        .snowflake  { width:6px;height:6px;background:white;border-radius:50%;filter:blur(0.5px);box-shadow:0 0 5px #ffffff;opacity:0.85; }

        /* layout */
        header { text-align:center;padding:30px 20px 20px;z-index:10;position:relative; }
        h1 {
            font-family: 'Fleur De Leah', cursive;
            color: var(--lavender);
            letter-spacing: 6px;
            font-size: 2.6rem;
            font-weight: 400;
            text-shadow: 0 0 15px var(--pink-glow), 0 0 30px var(--pink-glow);
        }
        .subtitle {
            font-family: 'Fleur De Leah', cursive;
            font-style: italic;
            opacity: 0.9;
            color: var(--blue);
            font-size: 1.8rem;
            text-shadow: 0 0 10px var(--pink-glow);
        }

        nav { margin:20px 0;display:flex;gap:15px;flex-wrap:wrap;justify-content:center;z-index:10;position:relative; }
        nav button {
            background: rgba(255,255,255,0.7);
            border: 1px solid var(--lavender);
            color: var(--lavender);
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.3rem;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            font-weight: bold;
            transition: 0.3s;
            font-family: 'Lavishly Yours', cursive;
            text-shadow: 0 0 8px var(--pink-glow);
        }
        nav button:hover, nav button.active {
            background: var(--lavender);
            color: white;
            text-shadow: 0 0 12px var(--pink-glow);
        }
        .index-toggle {
            background: none;
            border: none;
            color: var(--blue);
            cursor: pointer;
            text-decoration: underline;
            font-style: italic;
            opacity: 0.9;
            margin-bottom: 10px;
            z-index: 10;
            position: relative;
            display: block;
            text-align: center;
            width: 100%;
            font-family: 'Lavishly Yours', cursive;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
            text-shadow: 0 0 6px var(--pink-glow);
        }

        .commercial-text strong {
            color: #f5a7d3;
            font-weight: bold;
        }

        #poem-index {
            display: none;
            max-height: 200px; overflow-y: auto;
            margin: 10px auto 25px; padding: 15px;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(8px);
            border-radius: 16px; border: 1px solid var(--glow);
            width: 90%; max-width: 700px;
            z-index: 10; position: relative;
            font-family: 'Allura', cursive;
            font-size: 1.2rem;
        }
        .index-item { cursor:pointer;display:flex;align-items:center;padding:6px 0;transition:0.3s; }
        .index-item:hover .index-title { opacity:1;color:var(--lavender);padding-left:5px; }
        .index-heart {
            color: var(--lavender);
            margin-right: 12px;
            font-size: 1.3rem;
            text-shadow: 0 0 5px var(--pink-glow);
            transition: color 0.3s, text-shadow 0.3s;
        }
        .index-heart:hover {
            color: #d5cfe6;
            text-shadow: 0 0 12px var(--pink-glow), 0 0 20px var(--pink-glow);
        }
        .index-title { font-size:1.1rem;opacity:0.85; }

        #display-container {
            width: 90%; max-width: 800px;
            background: var(--card-bg); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 50px; min-height: 400px;
            z-index: 5; position: relative;
        }

        .meta-tag {
            font-family: 'Hurricane', cursive;
            font-size: 1.7rem;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
            margin-bottom: 15px;
            display: block;
            text-shadow: 0 0 7px var(--pink-glow);
        }

        .poem-title {
            font-family: 'Fleur De Leah', cursive;
            color: var(--blue);
            font-size: 2.4rem;
            margin-bottom: 20px;
            font-style: italic;
            text-shadow: 0 0 15px var(--pink-glow);
        }
        .poem-body {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 1.4rem;
            margin-bottom: 30px;
            font-family: 'Allura', cursive;
        }
        .poem-signature {
            font-family: 'Fleur De Leah', cursive;
            text-align: right;
            font-style: italic;
            color: var(--lavender);
            margin-top: 20px;
            border-top: 1px dashed var(--glow);
            padding-top: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 12px var(--pink-glow);
        }
        .novel-title {
            font-family: 'Fleur De Leah', cursive;
            color: var(--parchment);
            font-size: 2.2rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glow);
            padding-bottom: 10px;
            text-shadow: 0 0 12px var(--pink-glow);
        }

        #inner-view p {
            font-family: 'Allura', cursive;
            font-size: 1.7rem;
            line-height: 1.9;
        }

        .action-btn {
            background: var(--lavender);
            color: white;
            border: none;
            padding: 10px 25px;
            margin: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 40px;
            transition: 0.3s;
            font-family: 'Lavishly Yours', cursive;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--pink-glow);
        }
        .action-btn:hover { background: #8a7eab; }

        .pearls-compose { display:flex; flex-direction:column; gap:12px; margin-bottom:30px; }
        #pearl-input {
            width:100%; min-height:90px; padding:14px; border-radius:16px;
            border:1px solid var(--glow); background:rgba(255,255,255,0.5);
            font-family: 'Allura', cursive; font-size: 1.2rem; color:var(--text); resize:vertical;
        }
        #pearl-input:focus { outline:none; border-color:var(--lavender); }
        .pearls-status { text-align:center; color:var(--blue); font-style:italic; opacity:0.8; padding:30px 0; font-family: 'Allura', cursive; font-size:1.2rem; }
        .pearl-item { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:16px 0; border-top:1px dashed var(--glow); }
        .pearl-item:first-child { border-top:none; }
        .pearl-item.editing { flex-direction:column; align-items:stretch; }
        .pearl-item.editing .pearl-actions { justify-content:flex-end; }
        .pearl-content { white-space:pre-wrap; line-height:1.7; font-size:1.2rem; flex:1; font-family: 'Allura', cursive; }
        .pearl-actions { display:flex; gap:8px; flex-shrink:0; }
        .pearl-icon-btn { background:none; border:none; color:var(--lavender); cursor:pointer; font-size:1.2rem; opacity:0.7; transition:0.3s; padding:2px 4px; }
        .pearl-icon-btn:hover { opacity:1; }
        .pearl-edit-input { width:100%; min-height:80px; padding:10px; border-radius:12px; border:1px solid var(--lavender); font-family:'Allura', cursive; font-size:1.2rem; color:var(--text); resize:vertical; }

        /* Commercial headings (brand names, piece names) */
        #display-container h3 {
            font-family: 'Lavishly Yours', cursive;
            font-size: 2.6rem;
            text-shadow: 0 0 8px var(--pink-glow);
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            color: var(--text);
        }

        #display-container strong {
            font-family: 'Lavishly Yours', cursive;
            font-size: 1.9rem;
            display: block;
            margin-bottom: 10px;
            color: var(--lavender);
            text-shadow: 0 0 8px var(--pink-glow);
            letter-spacing: 0.5px;
        }

        /* Descriptive paragraphs inside commercial copy */
        .commercial-paragraph {
            font-size: 1.7rem;
            line-height: 1.9;
        }
    </style>
</head>
<body>
    <div id="wisteria-ceiling" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 200px; background-repeat: repeat-x; background-size: contain; z-index: 10;"></div>

        <div id="weather-container"></div>

        <header>
            <h1>Script & Stanza</h1>
            <div class="subtitle">The Poetic and Narrative Archive of Nyx</div>
        </header>

        <nav>
            <button id="poetry-nav" class="active" onclick="showPoetry()">The Aśk Archive</button>
            <button id="novel-nav" onclick="showNovels()">The Novel Codex</button>
        </nav>

        <button class="index-toggle" id="toggle-index">▸ Browse All Titles</button>
        <button class="index-toggle" id="pearls-nav" onclick="showPearls()">Lotus-Moon Pearls</button>

            clematis:    ["images/clematis1.png", "images/clematis2.png", "images/clematis3.png"],
            spirea:      ["images/spirea1.png"],
            carolina:    ["images/carolina1.png", "images/carolina2.png"],
            tigerlily:   ["images/tigerlily1.png", "images/tigerlily2.png", "images/tigerlily3.png"]
        };

        const types = Object.keys(flowerImages);
        let mode = 0;
        let storm = false;
        let currentNovel = 0;
    function updateCeiling() {
            const ceiling = document.getElementById('wisteria-ceiling');
            if (!ceiling) return;
            const isWisteria = types[mode] === 'wisteria';
            if (isWisteria && !storm) {
                const img = new Image();
                img.onload = function () {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth;
                        canvas.height = img.naturalHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const d = id.data;
                        for (let i = 0; i < d.length; i += 4) {
                            if (d[i] > 210 && d[i+1] > 210 && d[i+2] > 210) {
                                d[i+3] = 0;
                            }
                        }
                        ctx.putImageData(id, 0, 0);
                        ceiling.style.backgroundImage = `url(${canvas.toDataURL()})`;
                        ceiling.style.backgroundColor = 'transparent';
                        ceiling.style.display = 'block';
                    } catch(e) {
                        ceiling.style.backgroundColor = '#f7f3fa';
                        ceiling.style.display = 'block';
                    }
                };
                img.onerror = () => { ceiling.style.display = 'none'; };
                img.src = 'images/wisteria3.png';
            } else {
                ceiling.style.display = 'none';
            }
        }

        function buildIndex() {
            const c = document.getElementById('poem-index');
            if (!c || typeof poetryCollection === 'undefined') return;
            let h = '<div style="display:flex;flex-direction:column;gap:8px;">';
            poetryCollection.forEach(p => {
                h += `<div class="index-item" onclick="loadPoem(${p.id})"><span class="index-heart">♥</span><span class="index-title">${p.title}</span></div>`;
            });
            h += '</div>';
            c.innerHTML = h;
        }

        function loadPoem(id) {
            const p = poetryCollection.find(x => x.id === id);
            if (!p) return;
            const view = document.getElementById('inner-view');
            view.innerHTML = `
                <span class="meta-tag">#${p.id} of ${poetryCollection.length}</span>
                <div class="poem-title">${p.title}</div>
                ${p.dedication ? `<div style="color:var(--parchment);font-style:italic;">${p.dedication}</div>` : ''}
                <div class="poem-body">${p.body}</div>
                <div class="poem-signature">${p.signature}</div>`;
            document.getElementById('poem-index').style.display = 'none';
            document.getElementById('toggle-index').innerText = '▸ Browse All Titles';
            setActive('poetry-nav');
        }

        function showRandomPoem() {
            if (typeof poetryCollection === 'undefined') return;
            const safePoems = poetryCollection.filter(p => classroomSafeIds.includes(p.id));
            if (safePoems.length === 0) return;
            loadPoem(safePoems[Math.floor(Math.random() * safePoems.length)].id);
        }

        function showPoetry() { showRandomPoem(); }

        function toggleIndex() {
            const idx = document.getElementById('poem-index');
            const btn = document.getElementById('toggle-index');
            if (idx.style.display === 'none') {
                idx.style.display = 'block';
                btn.innerText = '▾ Browse All Titles';
            } else {
                idx.style.display = 'none';
                btn.innerText = '▸ Browse All Titles';
            }
        }

        function showNovels() {
            setActive('novel-nav');
            document.getElementById('poem-index').style.display = 'none';
            document.getElementById('toggle-index').innerText = '▸ Browse All Titles';
            const n = novels[currentNovel];
            document.getElementById('inner-view').innerHTML = `
            <div class="novel-title">${n.t}</div>
            <p style="line-height:1.8;">${n.d}</p>
            <div style="display:flex;gap:15px;justify-content:center;margin-top:30px;">
                 <button class="action-btn" onclick="prevNovel()">← Previous</button>
                 <button class="action-btn" onclick="nextNovel()">Next →</button>
            </div>`;
        }

        function nextNovel() { currentNovel = (currentNovel + 1) % novels.length; showNovels(); }
        function prevNovel() { currentNovel = (currentNovel - 1 + novels.length) % novels.length; showNovels(); }

        function setActive(id) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ===== LOTUSMOON PEARLS =====
        const PEARLS_URL = 'https://uwdqtmvpykhcntcqnmtu.supabase.co';
        const PEARLS_KEY = 'sb_publishable_14QT75f5ej18OOxJDnt6cA_bDQCqrm8';
        const pearlsClient = supabase.createClient(PEARLS_URL, PEARLS_KEY);
        const PEARLS_PASSCODE = 'nyx-9597';
        let pearlsUnlocked = false;

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function showPearls() {
            if (!pearlsUnlocked) {
                const entered = prompt('Enter the passcode to open Lotus-Moon Pearls:');
                if (entered === null) return;
                if (entered !== PEARLS_PASSCODE) {
                    alert('Incorrect passcode.');
                    return;
                }
                pearlsUnlocked = true;
            }
            setActive('pearls-nav');
            document.getElementById('poem-index').style.display = 'none';
            document.getElementById('toggle-index').innerText = '▸ Browse All Titles';
            document.getElementById('inner-view').innerHTML = `
                <div class="pearls-compose">
                    <textarea id="pearl-input" placeholder="A stray thought, a line, an idea..."></textarea>
                    <button class="action-btn" onclick="savePearl()">Save</button>
                </div>
                <div id="pearls-list"><p class="pearls-status">Loading...</p></div>`;
            loadPearls();
        }

        async function loadPearls() {
            const list = document.getElementById('pearls-list');
            try {
                const { data, error } = await pearlsClient
                    .from('pearls')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (error) throw error;
                renderPearls(data);
            } catch (e) {
                list.innerHTML = '<p class="pearls-status">Couldn\'t load pearls. Check your Supabase setup.</p>';
            }
        }

        function renderPearls(rows) {
            const list = document.getElementById('pearls-list');
            if (!rows || rows.length === 0) {
                list.innerHTML = '<p class="pearls-status">No pearls yet.</p>';
                return;
            }
            list.innerHTML = rows.map(row => `
                <div class="pearl-item" data-id="${row.id}">
                    <div class="pearl-content">${escapeHtml(row.content)}</div>
                    <div class="pearl-actions">
                        <button class="pearl-icon-btn" onclick="startEditPearl(${row.id})" title="Edit">✎</button>
                        <button class="pearl-icon-btn" onclick="deletePearl(${row.id})" title="Delete">✕</button>
                    </div>
                </div>`).join('');
        }

        async function savePearl() {
            const input = document.getElementById('pearl-input');
            const text = input.value.trim();
            if (!text) return;
            try {
                const { error } = await pearlsClient.from('pearls').insert({ content: text });
                if (error) throw error;
                input.value = '';
                loadPearls();
            } catch (e) {
                alert('Could not save. Check your Supabase setup.');
            }
        }

        function startEditPearl(id) {
            const item = document.querySelector(`.pearl-item[data-id="${id}"]`);
            if (!item) return;
            const current = item.querySelector('.pearl-content').innerText;
            item.classList.add('editing');
            item.innerHTML = `
                <textarea class="pearl-edit-input">${escapeHtml(current)}</textarea>
                <div class="pearl-actions">
                    <button class="pearl-icon-btn" onclick="saveEditPearl(${id})" title="Save">✓</button>
                    <button class="pearl-icon-btn" onclick="loadPearls()" title="Cancel">✕</button>
                </div>`;
        }

        async function saveEditPearl(id) {
            const item = document.querySelector(`.pearl-item[data-id="${id}"]`);
            const text = item.querySelector('.pearl-edit-input').value.trim();
            if (!text) return;
            try {
                const { error } = await pearlsClient.from('pearls').update({ content: text }).eq('id', id);
                if (error) throw error;
                loadPearls();
            } catch (e) {
                alert('Could not save changes.');
            }
        }

        async function deletePearl(id) {
            if (!confirm('Delete this pearl?')) return;
            try {
                const { error } = await pearlsClient.from('pearls').delete().eq('id', id);
                if (error) throw error;
                loadPearls();
            } catch (e) {
                alert('Could not delete.');
            }
        }

        // ===== WEATHER ENGINE =====
        (function () {
            const container = document.getElementById('weather-container');

            setInterval(() => {
                if (!storm) {
                    mode = (mode + 1) % types.length;
                    updateCeiling();
                }
            }, 120000);   // 2 minutes per flower type

            (function scheduleStorm() {
                const delay = 40000 + Math.random() * 20000;
                setTimeout(() => {
                    storm = true;
                    updateCeiling();
                    setTimeout(() => {
                        storm = false;
                        updateCeiling();
                        scheduleStorm();
                    }, 10000);
                }, delay);
            })();

            function createParticle() {
                const p = document.createElement('div');
                const r = Math.random();
                let particleType;

                if (storm) {
                    if (r < 0.25) particleType = 'rain';
                    else if (r < 0.45) particleType = 'snowflake';
                    else particleType = types[Math.floor(Math.random() * types.length)];
                } else {
                    if (r < 0.25) particleType = 'rain';
                    else if (r < 0.45) particleType = 'snowflake';
                    else particleType = types[mode];
                }

                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                const dur = (particleType === 'rain') ? 1.2 : 6 + Math.random() * 6;
                p.style.animationDuration = dur + 's';
                p.style.animationDelay = -(Math.random() * 3) + 's';

                if (particleType === 'rain') {
                    p.classList.add('rain-drop');
                } else if (particleType === 'snowflake') {
                    p.classList.add('snowflake');
                } else {
                    p.classList.add(`petal-${particleType}`);
                    if (Math.random() < 0.5) {
                        const imgs = flowerImages[particleType];
                        if (imgs && imgs.length) {
                            const src = imgs[Math.floor(Math.random() * imgs.length)];
                            const img = new Image();
                            img.onload = function () {
                                if (!p.parentNode) return;
                                try {
                                    const canvas = document.createElement('canvas');
                                    canvas.width = 38;
                                    canvas.height = 38;
                                    const ctx = canvas.getContext('2d');
                                    ctx.drawImage(img, 0, 0, 38, 38);
                                    const id = ctx.getImageData(0, 0, 38, 38);
                                    const d = id.data;
                                    for (let i = 0; i < d.length; i += 4) {
                                        if (d[i] > 210 && d[i+1] > 210 && d[i+2] > 210) {
                                            d[i+3] = 0;
                                        }
                                    }
                                    ctx.putImageData(id, 0, 0);
                                    const out = new Image();
                                    out.src = canvas.toDataURL();
                                    out.style.width = '38px';
                                    out.style.height = '38px';
                                    out.style.objectFit = 'contain';
                                    p.className = 'particle flower-img';
                                    p.style.background = 'none';
                                    p.innerHTML = '';
                                    p.appendChild(out);
                                } catch(e) {}
                            };
                            img.onerror = function () {};
                            img.src = src;
                        }
                    }
                }

                container.appendChild(p);
                setTimeout(() => { if (p.parentNode) p.remove(); }, (dur + 2) * 1000);
            }

            (function loop() {
                const batch = storm ? 4 : 2;
                for (let i = 0; i < batch; i++) createParticle();
                setTimeout(loop, storm ? 60 : 120);
            })();

            updateCeiling();
        })();

        window.onload = () => {
            if (typeof poetryCollection !== 'undefined') {
                buildIndex();
                showRandomPoem();
                document.getElementById('toggle-index').onclick = toggleIndex;
            } else {
                document.getElementById('view').innerHTML = '<p>❌ poems.js missing</p>';
            }
        };
    </script>
</body>
</html>
